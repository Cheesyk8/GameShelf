const FULL_RULES = {
  "Battleship":{objective:"Sink all 5 of your opponent's ships before they sink yours.",setup:["Each player gets a two-grid board — one for your fleet, one for tracking shots.","Secretly place your 5 ships: Carrier (5), Battleship (4), Destroyer (3), Submarine (3), Patrol Boat (2).","Ships placed horizontally or vertically only — no overlap.","Once placed, ships cannot be moved."],gameplay:["Players alternate turns. Call a grid coordinate (e.g. B-7).","Opponent responds: Hit! or Miss!","Mark hits red, misses white on your tracking grid.","When all squares of a ship are hit, opponent announces the ship name.","Keep firing until all 5 ships are sunk."],winning:"First player to sink all 5 opponent ships wins!",variants:["Salvo: Multiple shots per turn equal to remaining ships.","Super Battleship: Adds aircraft and aerial strikes."],tips:["After a hit, fire in a cross pattern to find the ship's orientation.","Ships are often placed along edges — don't neglect the borders."]},
  "Scattergories":{objective:"Score the most points by naming unique answers to categories starting with the rolled letter.",setup:["Each player gets a folder with answer sheet and category list.","Roll the 20-sided letter die.","Set the 3-minute timer."],gameplay:["Simultaneously write one answer per category starting with that letter.","Alliterative answers (both words start with the letter) score 2 points.","When time is up, read answers aloud.","Duplicate answers are crossed out — zero points.","Only unique answers score."],winning:"Highest total after agreed rounds wins.",scoring:"1 point per unique answer · 2 points for alliterative answers",tips:["Think obscure — common answers will likely be duplicated.","For Q, X, Z: brand names and proper nouns are often allowed by house rules."]},
  "Candy Land":{objective:"Be first to reach King Kandy's Candy Castle.",setup:["Place board in reach of all players.","Each player takes a gingerbread pawn and places on START.","Shuffle cards and place face-down."],gameplay:["Draw the top card on your turn.","Single-color card: Move to the nearest space of that color.","Double-color card: Move to the second nearest space.","Character cards: Move directly to that character's space — can be backward!","Licorice space: Lose your next turn."],winning:"First to reach or pass the Candy Castle wins — no exact count needed!",tips:["Purely luck-based — no decisions required, perfect for ages 3+.","Invented in the 1940s by Eleanor Abbott while recovering from polio."]},
  "Jenga":{objective:"Remove blocks without toppling the tower. The player who causes the collapse loses.",setup:["Stack all 54 blocks in sets of 3 perpendicular layers.","Use the loading tray for a neat 18-layer starting tower."],gameplay:["Use ONE hand only to remove a block from below the top completed layer.","You may touch blocks to find a loose one, but must use it once moved halfway.","Place the removed block on the topmost layer.","Turn ends 10 seconds after placement."],winning:"The player who causes the collapse LOSES. Previous player wins.",tips:["Center blocks are almost always the safest to remove.","Never remove from the top three layers — it's against the rules.","Test blocks with a gentle tap to find loose ones."]},
  "Boggle":{objective:"Find more valid words than opponents in the 4×4 grid within 3 minutes.",setup:["Shake the dome to randomize 16 letter cubes.","Each player takes paper and pencil.","Flip the 3-minute timer to start."],gameplay:["Find words by connecting adjacent letters (including diagonals).","Each cube used only once per word.","Minimum 3 letters.","Shared words cancel out — only unique words score."],winning:"Highest score after agreed rounds wins.",scoring:"3–4 letters=1pt · 5 letters=2pts · 6 letters=3pts · 7 letters=5pts · 8+=11pts",tips:["Add -S, -ED, -ING to verbs for easy extra points.","QU counts as one cube — look for QUEEN, QUEST, QUIP."]},
  "Yahtzee":{objective:"Score the most points by rolling five dice combinations over 13 rounds.",setup:["Each player takes a scorecard.","Roll one die each to determine order — highest goes first."],gameplay:["Roll all 5 dice. Up to 3 rolls per turn.","Set aside keepers between rolls.","After 3rd roll, MUST score in one empty box.","Upper Section: Sum of matching number.","Lower Section: Three/Four of a Kind, Full House (25), Small Straight (30), Large Straight (40), Yahtzee (50), Chance.","Score 63+ in upper section for 35-point bonus."],winning:"After all 13 boxes filled, highest total wins.",scoring:"Yahtzee=50pts · Large Straight=40pts · Small Straight=30pts · Full House=25pts · Bonus Yahtzees=100pts each",tips:["Prioritize upper section bonus early.","Use Chance as a safety valve for decent but non-combo rolls.","Second Yahtzee scores 100 bonus points plus joker rule."]},
  "Scrabble":{objective:"Score the most points forming words on the crossword-style board.",setup:["Place all 100 tiles face-down in the bag and mix.","Each player draws 7 tiles. Keep hidden on your rack.","Closest letter to A goes first. First word must cross the center star."],gameplay:["Place tiles, exchange tiles, or pass on your turn.","Words must connect to existing words like a crossword.","Horizontal or vertical only — never diagonal.","Draw replacement tiles after playing to maintain 7.","Premium squares multiply scores. Blank tiles worth 0 but represent any letter.","Using all 7 tiles earns a 50-point BINGO bonus."],winning:"Highest score when bag is empty and one player uses all tiles.",scoring:"Each letter has a value (A=1, Q=10, Z=10). Multiply by premium squares. Bingo=+50pts.",tips:["Learn 2-letter words: QI, ZA, XI, JO, KA, OX — they're all valid!","Save S tiles for high-value parallel plays."]},
  "Clue":{objective:"Determine who killed Mr. Boddy, with what weapon, and in which room.",setup:["Separate cards into three decks: Suspects (6), Weapons (6), Rooms (9).","Place one random card from each deck in the confidential envelope.","Deal remaining 18 cards equally to players.","Players review their cards privately — these are NOT the answer."],gameplay:["Roll dice and move through mansion rooms.","In a room, make a SUGGESTION: name a suspect, weapon, and the room you're in.","Player to your left secretly shows ONE card from their hand that matches.","Note what's disproved on your detective sheet.","When confident, make an ACCUSATION: state all three elements."],winning:"First correct accusation wins. Incorrect accusation eliminates that player.",tips:["Your own cards cannot be the answer — use them to eliminate immediately.","Watch who CAN'T disprove suggestions — as valuable as who can."]},
  "Monopoly":{objective:"Become the wealthiest player by bankrupting all opponents.",setup:["Each player starts with $1,500 in various bills.","All tokens placed on GO.","Shuffle Community Chest and Chance cards separately."],gameplay:["Roll both dice and advance clockwise.","Unowned property: Buy at printed price or go to auction.","Owned property: Pay rent — increases with houses and hotels.","GO: Collect $200 every time you pass or land.","Jail: Pay $50, use Get Out of Jail Free card, or roll doubles.","Build houses/hotels once you own ALL properties of a color group."],winning:"Last player solvent after all others go bankrupt wins.",tips:["Most landed-on: Illinois Ave, GO, B&O Railroad, Tennessee Ave.","Never leave cash idle — buy every property early.","Orange and red groups are the sweet spot for development."]},
  "Chess":{objective:"Checkmate your opponent's King — put it under attack with no legal escape.",setup:["Light square in bottom-right corner for each player.","Back row left to right: Rook, Knight, Bishop, Queen, King, Bishop, Knight, Rook.","Queen on her own color. Pawns fill second row. White moves first."],gameplay:["PAWN: Forward 1 (or 2 on first move), captures diagonally.","ROOK: Any squares horizontally or vertically.","KNIGHT: L-shape — only piece that jumps over others.","BISHOP: Any squares diagonally — always same color.","QUEEN: Any squares any direction.","KING: One square any direction. Cannot move into check.","CASTLING: King 2 squares toward unmoved Rook — if neither has moved and no pieces between.","PAWN PROMOTION: Pawn reaching back rank becomes any piece."],winning:"Checkmate the opponent's King. Draws by stalemate, repetition, or agreement.",scoring:"Pawn=1 · Knight=3 · Bishop=3 · Rook=5 · Queen=9",tips:["Opening: Control center, develop knights before bishops, castle early.","Learn forks, pins, and skewers — three tactics that win material."]},
  "Checkers & Backgammon":{objective:"CHECKERS: Capture all opponent pieces. BACKGAMMON: Bear all checkers off first.",setup:["CHECKERS: 12 pieces each on dark squares of closest 3 rows.","BACKGAMMON: Standard setup — 2 on opponent's 24-pt, 5 on 13-pt, 3 on 8-pt, 5 on 6-pt."],gameplay:["CHECKERS: Move diagonally forward. Capture by jumping over opponent piece.","CHECKERS: Multi-jump required if available. Kings move any direction.","BACKGAMMON: Roll two dice. Each die is a separate move toward your home board.","BACKGAMMON: Landing on a blot (lone checker) sends it to the bar.","BACKGAMMON: Once all checkers in home board, bear them off with exact or higher rolls."],winning:"CHECKERS: Capture all 12 opponent pieces. BACKGAMMON: First to bear off all 15.",tips:["CHECKERS: Sacrifice pieces to force multi-jumps capturing more.","BACKGAMMON: Priming (6 consecutive blocked points) traps opponent."]},

/* ─── CONFETTI ───────────────────────────────────────────────────── */
function Confetti({onDone}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const pieces=Array.from({length:140},()=>({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*8+4, d:Math.random()*140+80,
      color:`hsl(${Math.random()*360},90%,60%)`,
      tilt:Math.random()*10-10, tiltAngle:0,
      tiltSpeed:Math.random()*0.07+0.05,
    }));
    let frame=0, raf;
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{
        p.tiltAngle+=p.tiltSpeed;
        p.y+=Math.cos(frame/10+p.d)+2;
        p.x+=Math.sin(frame/10)*0.5;
        p.tilt=Math.sin(p.tiltAngle)*12;
        ctx.beginPath();
        ctx.fillStyle=p.color;
        ctx.ellipse(p.x,p.y,p.r,p.r*0.4,p.tilt,0,Math.PI*2);
        ctx.fill();
      });
      frame++;
      if(frame<220) raf=requestAnimationFrame(draw);
      else onDone();
    }
    draw();
    return()=>cancelAnimationFrame(raf);
  },[]);
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,zIndex:99999,pointerEvents:"none"}}/>;
}

function RuleSection({sectionKey,rules,sp,T}){
  const content=rules[sectionKey];

  if(typeof content==="string")return(
    <div style={{background:T.surface,borderRadius:16,padding:20,border:`1.5px solid ${sp.bg}33`}}>
      <p style={{color:T.text,fontSize:15,lineHeight:1.75,margin:0,fontWeight:500}}>{content}</p>
    </div>
  );
  if(Array.isArray(content))return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {content.map((item,i)=>{
        const bm=item.match(/^([A-Z][A-Z &/\-]+:)\s*(.+)$/);

            </p>
          </div>
        );
      })}

  );
  return null;
}

/* ─── DASHBOARD ──────────────────────────────────────────────────── */
function Dashboard({gameData,theme:T,onSelectGame}){
  const gamesWithData=INIT_GAMES.map(g=>({...g,gd:gameData[g.id]||{},isOwned:gameData[g.id]?.owned??g.ownedDefault}));
  const owned=gamesWithData.filter(g=>g.isOwned);
  const missing=gamesWithData.filter(g=>!g.isOwned);
  const rated=gamesWithData.filter(g=>g.gd.myRating>0);
  const allPlays=gamesWithData.flatMap(g=>(g.gd.plays||[]).map(p=>({...p,game:g})));
  const totalPlays=allPlays.length;
  const avgBGG=(owned.reduce((s,g)=>s+g.bggRating,0)/Math.max(owned.length,1)).toFixed(1);
  const topRated=[...rated].sort((a,b)=>b.gd.myRating-a.gd.myRating).slice(0,5);
  const mostPlayed=[...gamesWithData].sort((a,b)=>(b.gd.plays||[]).length-(a.gd.plays||[]).length).filter(g=>(g.gd.plays||[]).length>0).slice(0,5);
  const recentPlays=[...allPlays].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const catCounts=Object.entries(CAT_COLOR).map(([cat,color])=>({cat,color,emoji:CAT_EMOJI[cat],count:owned.filter(g=>g.category===cat).length,total:INIT_GAMES.filter(g=>g.category===cat).length})).filter(c=>c.count>0).sort((a,b)=>b.count-a.count);
  const missingCost=missing.reduce((s,g)=>s+g.price,0);
  const diffCounts=[1,2,3,4,5].map(d=>({d,label:DIFF_LABEL[d],color:DIFF_COLOR[d],count:owned.filter(g=>DIFFICULTY[g.title]===d).length}));

  const Stat=({n,label,color,sub})=>(
    <div style={{background:T.surface,border:`1px solid ${T.cardBorder}`,borderRadius:18,padding:"20px 18px",textAlign:"center"}}>
      <div style={{fontWeight:900,fontSize:36,color:color||T.text,lineHeight:1}}>{n}</div>
      <div style={{fontSize:12,fontWeight:700,color:T.textMuted,textTransform:"uppercase",letterSpacing:1,marginTop:4}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:T.textFaint,marginTop:4}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 20px 60px"}}>
      <div style={{marginBottom:28}}>
        <h2 style={{fontFamily:"'Outfit',sans-serif",fontWeight:900,fontSize:28,color:T.text,margin:"0 0 6px",letterSpacing:-0.5}}>Collection Dashboard 📊</h2>
        <p style={{color:T.textMuted,fontSize:14,margin:0}}>A deep-dive into your WS Game Company collection</p>
      </div>

      {/* Top stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:28}}>
        <Stat n={owned.length} label="Owned" color="#4ade80" sub={`of ${INIT_GAMES.length} total`}/>
        <Stat n={missing.length} label="Wishlist" color="#f87171" sub={`$${missingCost} to complete`}/>
        <Stat n={`${Math.round(owned.length/INIT_GAMES.length*100)}%`} label="Complete" color="#818cf8"/>
        <Stat n={totalPlays} label="Total Plays" color="#f59e0b" sub={totalPlays===1?"1 session":totalPlays>0?`across ${new Set(allPlays.map(p=>p.game.id)).size} games`:"Log your first!"}/>
        <Stat n={avgBGG} label="Avg BGG Rating" color="#06b6d4" sub="owned games"/>
        <Stat n={rated.length} label="You've Rated" color="#a78bfa" sub={`of ${owned.length} owned`}/>
      </div>

      {/* Two column grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:20}}>

        {/* Category breakdown */}
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:20,padding:22}}>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:16}}>📂 By Category</div>
          {catCounts.map(({cat,color,emoji,count,total})=>(
            <div key={cat} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:16}}>{emoji}</span>
                  <span style={{fontSize:13,fontWeight:700,color:T.text}}>{cat}</span>
                </div>
                <span style={{fontSize:12,fontWeight:600,color:T.textMuted}}>{count}/{total}</span>
              </div>
              <div style={{background:T.surface,borderRadius:99,height:8,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${count/total*100}%`,background:color,borderRadius:99,transition:"width 0.8s ease"}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Difficulty spread */}
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:20,padding:22}}>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:16}}>🎯 Difficulty Spread</div>
          {diffCounts.filter(d=>d.count>0).map(({d,label,color,count})=>(
            <div key={d} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:8,height:12,borderRadius:2,background:i<=d?color:T.surface}}/>)}</div>
                  <span style={{fontSize:13,fontWeight:700,color:T.text}}>{label}</span>
                </div>
                <span style={{fontSize:12,fontWeight:600,color:T.textMuted}}>{count} game{count!==1?"s":""}</span>
              </div>
              <div style={{background:T.surface,borderRadius:99,height:8,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${count/owned.length*100}%`,background:color,borderRadius:99,transition:"width 0.8s ease"}}/>
              </div>
            </div>
          ))}
          {owned.length===0&&<p style={{color:T.textMuted,fontSize:13}}>Mark games as owned to see your difficulty spread.</p>}
        </div>

        {/* Top rated by you */}
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:20,padding:22}}>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:16}}>⭐ Your Top Rated</div>
          {topRated.length===0
            ?<p style={{color:T.textMuted,fontSize:13}}>Rate games in the detail view to see your favourites here.</p>
            :topRated.map((g,i)=>{
              const sp=SPINE[g.title]||{bg:"#6366f1"};
              return(
                <div key={g.id} onClick={()=>onSelectGame(g)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:14,cursor:"pointer",marginBottom:6,border:`1px solid ${T.cardBorder}`,background:T.surface,transition:"all 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=sp.bg+"22"} onMouseLeave={e=>e.currentTarget.style.background=T.surface}>
                  <div style={{fontWeight:900,fontSize:18,color:T.textFaint,width:24,textAlign:"center"}}>#{i+1}</div>
                  <div style={{fontSize:26}}>{g.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:T.text}}>{g.title}</div>
                    <div style={{display:"flex",gap:2,marginTop:3}}>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=g.gd.myRating?"#f59e0b":T.cardBorder,fontSize:14}}>★</span>)}</div>
                  </div>
                </div>
              );
            })}
        </div>

        {/* Most played */}
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:20,padding:22}}>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:16}}>🎮 Most Played</div>
          {mostPlayed.length===0
            ?<p style={{color:T.textMuted,fontSize:13}}>Log game sessions to see which games hit the table most often.</p>
            :mostPlayed.map((g,i)=>{
              const sp=SPINE[g.title]||{bg:"#6366f1"};
              const count=(g.gd.plays||[]).length;
              return(
                <div key={g.id} onClick={()=>onSelectGame(g)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:14,cursor:"pointer",marginBottom:6,border:`1px solid ${T.cardBorder}`,background:T.surface,transition:"all 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=sp.bg+"22"} onMouseLeave={e=>e.currentTarget.style.background=T.surface}>
                  <div style={{fontWeight:900,fontSize:18,color:T.textFaint,width:24,textAlign:"center"}}>#{i+1}</div>
                  <div style={{fontSize:26}}>{g.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:T.text}}>{g.title}</div>
                    <div style={{fontSize:12,color:T.textMuted,marginTop:2}}>{count} session{count!==1?"s":""}</div>
                  </div>
                  <div style={{background:`${sp.bg}22`,color:sp.bg,fontWeight:800,fontSize:14,padding:"4px 10px",borderRadius:99}}>{count}×</div>
                </div>
              );
            })}
        </div>

        {/* Recent plays */}
        <div style={{background:T.card,border:`1px solid ${T.cardBorder}`,borderRadius:20,padding:22,gridColumn:"1 / -1"}}>
          <div style={{fontWeight:800,fontSize:16,color:T.text,marginBottom:16}}>🗓️ Recent Game Nights</div>
          {recentPlays.length===0
            ?<p style={{color:T.textMuted,fontSize:13}}>Your logged game sessions will appear here. Start by opening any game and tapping the Plays tab!</p>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
              {recentPlays.map((p,i)=>{
                const sp=SPINE[p.game.title]||{bg:"#6366f1"};
                return(
                  <div key={i} onClick={()=>onSelectGame(p.game)} style={{background:T.surface,borderRadius:14,padding:14,border:`1.5px solid ${T.cardBorder}`,cursor:"pointer",transition:"all 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=sp.bg} onMouseLeave={e=>e.currentTarget.style.borderColor=T.cardBorder}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <div style={{width:38,height:38,borderRadius:10,background:`${sp.bg}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{p.game.emoji}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:T.text}}>{p.game.title}</div>
                        <div style={{fontSize:11,color:T.textMuted}}>{new Date(p.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                      </div>
                      {p.winner&&<div style={{marginLeft:"auto",background:"#f59e0b22",color:"#f59e0b",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,flexShrink:0}}>🏆 {p.winner}</div>}
                    </div>
                    <div style={{fontSize:12,color:T.textMuted}}>With: {p.who}</div>
                    {p.snacks?.length>0&&<div style={{fontSize:11,color:T.textFaint,marginTop:4}}>{p.snacks.slice(0,3).join(" · ")}{p.snacks.length>3?` +${p.snacks.length-3} more`:""}</div>}
                  </div>
                );
              })}
            </div>}
        </div>

        {/* Wishlist */}
        {missing.length>0&&(
          <div style={{background:"linear-gradient(135deg,#0f0c29,#302b63)",borderRadius:20,padding:22,gridColumn:"1 / -1"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14,marginBottom:18}}>
              <div>
                <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#a5b4fc",fontWeight:700,marginBottom:4}}>Complete Your Collection</div>
                <div style={{fontWeight:900,fontSize:32,color:"#fff"}}>${missingCost}<span style={{fontSize:14,fontWeight:400,color:"#64748b"}}> estimated</span></div>
              </div>
              <a href="https://www.wsgamecompany.com/collections/vintage-bookshelf-games" target="_blank" rel="noreferrer"
                style={{background:"linear-gradient(135deg,#6366f1,#818cf8)",color:"#fff",padding:"13px 24px",borderRadius:14,fontWeight:800,fontSize:14,textDecoration:"none",boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>
                Shop at WS Game Co →
              </a>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
              {missing.map(g=>{
                const sp=SPINE[g.title]||{bg:"#6366f1"};
                return(
                  <div key={g.id} onClick={()=>onSelectGame(g)} style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"10px 14px",cursor:"pointer",transition:"all 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.12)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.07)"}>
                    <div style={{fontSize:22}}>{g.emoji}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:"#fff"}}>{g.title}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>${g.price}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── LEGEND ─────────────────────────────────────────────────────── */
const LEGEND_CATS=[{cat:"Strategy",color:"#2563eb",emoji:"⚔️"},{cat:"Word",color:"#16a34a",emoji:"🔤"},{cat:"Party",color:"#c0392b",emoji:"🎉"},{cat:"Children",color:"#ca8a04",emoji:"🧸"},{cat:"Dexterity",color:"#b45309",emoji:"🤚"},{cat:"Mystery",color:"#7c3aed",emoji:"🔍"},{cat:"Deduction",color:"#0891b2",emoji:"🧩"},{cat:"Trivia",color:"#854d0e",emoji:"🧠"},{cat:"Family",color:"#0369a1",emoji:"👨‍👩‍👧"},{cat:"Classic",color:"#92400e",emoji:"🏛️"},{cat:"Dice",color:"#ea580c",emoji:"🎲"}];

/* ─── ROOT APP ───────────────────────────────────────────────────── */
function App(){
  const [gameData,setGameData_]=useState(()=>load("wsGameData",{}));
  const [themeName,setThemeName]=useState(()=>load("wsTheme","dark"));
  const [page,setPage]=useState("collection"); // "collection" | "dashboard"
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [active,setActive]=useState(null);
  const [shelfView,setShelfView]=useState("spine");
  const [catFilter,setCatFilter]=useState(null);
  const [showConfetti,setShowConfetti]=useState(false);
  const [tourStep,setTourStep]=useState(()=>load("wsTourDone",false)?-1:0);
  const prevOwned=useRef(null);

  const T=THEMES[themeName];
  function setGameData(d){setGameData_(d);save("wsGameData",d);}
  function updateGame(id,patch){
    const next={...gameData,[id]:{...(gameData[id]||{}),...patch}};
    // Check if owned count just increased
    const wasOwned=prevOwned.current??INIT_GAMES.filter(g=>gameData[g.id]?.owned??g.ownedDefault).length;
    const nowOwned=INIT_GAMES.filter(g=>next[g.id]?.owned??g.ownedDefault).length;
    if(nowOwned>wasOwned){setShowConfetti(true);}
    prevOwned.current=nowOwned;
    setGameData(next);
  }
  function toggleTheme(){const n=themeName==="dark"?"light":"dark";setThemeName(n);save("wsTheme",n);}
  function finishTour(){setTourStep(-1);save("wsTourDone",true);}

  const owned=INIT_GAMES.filter(g=>gameData[g.id]?.owned??g.ownedDefault).length;
  const missing=INIT_GAMES.length-owned;
  const pct=Math.round(owned/INIT_GAMES.length*100);
  const missingCost=INIT_GAMES.filter(g=>!(gameData[g.id]?.owned??g.ownedDefault)).reduce((s,g)=>s+g.price,0);

  const visible=INIT_GAMES.filter(g=>{
    const isOwned=gameData[g.id]?.owned??g.ownedDefault;
    const fOk=filter==="all"||(filter==="owned"&&isOwned)||(filter==="missing"&&!isOwned);
    const cOk=!catFilter||g.category===catFilter;
    const q=search.toLowerCase();
    const sOk=!q||g.title.toLowerCase().includes(q)||g.category.toLowerCase().includes(q)||g.tags.some(t=>t.toLowerCase().includes(q));
    return fOk&&cOk&&sOk;
  });

  return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"'Outfit','Inter',system-ui,sans-serif",transition:"background 0.3s,color 0.3s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
        *{box-sizing:border-box}
        ::-webkit-scrollbar{height:4px;width:5px}
        ::-webkit-scrollbar-thumb{background:${T.textFaint};border-radius:99px}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
      `}</style>

      {showConfetti&&<Confetti onDone={()=>setShowConfetti(false)}/>}
      {tourStep>=0&&tourStep<TOUR_STEPS.length&&(
        <OnboardingTooltip step={tourStep} total={TOUR_STEPS.length}
          onNext={()=>tourStep===TOUR_STEPS.length-1?finishTour():setTourStep(t=>t+1)}
          onSkip={finishTour} theme={T}/>
      )}

      {/* ── NAV ── */}
      <div style={{background:T.navBg,backdropFilter:"blur(16px)",borderBottom:`1px solid ${T.cardBorder}`,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200,height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:22}}>🎲</span>
          <span style={{fontWeight:900,fontSize:16,color:T.text,letterSpacing:-0.5}}>GameShelf</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[{k:"collection",l:"📚 Collection"},{k:"dashboard",l:"📊 Dashboard"}].map(({k,l})=>(
            <button key={k} onClick={()=>setPage(k)}
              style={{padding:"8px 16px",borderRadius:99,border:"none",fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all 0.2s",
                background:page===k?T.accent:"transparent",color:page===k?"#fff":T.textMuted}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>{setTourStep(0);save("wsTourDone",false);}} title="Restart tour"
            style={{background:"none",border:`1.5px solid ${T.cardBorder}`,color:T.textMuted,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
            ?
          </button>
          <button onClick={toggleTheme} title={`Switch to ${themeName==="dark"?"light":"dark"} mode`}
            style={{background:"none",border:`1.5px solid ${T.cardBorder}`,color:T.text,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
            {themeName==="dark"?"☀️":"🌙"}
          </button>
        </div>
      </div>

      {/* ── DASHBOARD PAGE ── */}
      {page==="dashboard"&&(
        <Dashboard gameData={gameData} theme={T} onSelectGame={g=>{setPage("collection");setTimeout(()=>setActive(g),100);}}/>
      )}

      {/* ── COLLECTION PAGE ── */}
      {page==="collection"&&(<>
        {/* HEADER */}
        <div style={{background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"36px 24px 0",textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 15% 40%,rgba(99,102,241,.22) 0%,transparent 55%),radial-gradient(circle at 85% 20%,rgba(244,114,182,.15) 0%,transparent 50%)",pointerEvents:"none"}}/>
          <div style={{position:"relative"}}>
            <div style={{fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"#a5b4fc",fontWeight:700,marginBottom:10}}>WS Game Company · Vintage Bookshelf Series</div>
            <h1 style={{fontSize:"clamp(26px,5vw,44px)",fontWeight:900,color:"#fff",margin:0,letterSpacing:-1.5,lineHeight:1}}>My Game Collection 🎲</h1>
            <p style={{color:"#94a3b8",fontSize:14,margin:"10px auto 0",maxWidth:380}}>Track, rate &amp; discover all 22 vintage bookshelf classics</p>
            {/* Progress */}
            <div style={{maxWidth:480,margin:"22px auto 0",background:"rgba(255,255,255,0.06)",backdropFilter:"blur(10px)",borderRadius:20,padding:"16px 22px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:11}}>
                {[{n:owned,l:"Owned",c:"#4ade80"},{n:missing,l:"Wishlist",c:"#f87171"},{n:INIT_GAMES.length,l:"Total",c:"#fff"},{n:pct+"%",l:"Complete",c:"#a5b4fc"}].map(({n,l,c})=>(
                  <div key={l} style={{textAlign:"center"}}>
                    <div style={{fontWeight:900,fontSize:24,color:c,lineHeight:1}}>{n}</div>
                    <div style={{fontSize:10,color:"#64748b",letterSpacing:1.5,textTransform:"uppercase",marginTop:3}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:99,height:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#6366f1,#4ade80)",borderRadius:99,boxShadow:"0 0 14px rgba(99,102,241,.7)",transition:"width 1s ease"}}/>
              </div>
              {missing>0&&<div style={{fontSize:11,color:"#64748b",marginTop:7,textAlign:"right"}}>Complete for <span style={{color:"#f87171",fontWeight:700}}>${missingCost}</span></div>}
            </div>
            {/* View toggle */}
            <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:24,marginBottom:0}}>
              {[{k:"spine",icon:"📚",label:"Spine View"},{k:"covers",icon:"🖼️",label:"Cover Grid"}].map(({k,icon,label})=>(
                <button key={k} onClick={()=>setShelfView(k)}
                  style={{display:"flex",alignItems:"center",gap:7,padding:"10px 22px",borderRadius:99,fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",border:"none",transition:"all 0.22s",
                    background:shelfView===k?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.06)",
                    color:shelfView===k?"#fff":"#64748b",
                    boxShadow:shelfView===k?"0 0 0 1.5px rgba(255,255,255,0.3)":"none",backdropFilter:"blur(4px)"}}>
                  <span style={{fontSize:16}}>{icon}</span>{label}
                </button>
              ))}
            </div>
            {/* Shelf */}
            <div style={{marginTop:18}}>
              {shelfView==="spine"
                ?<Bookshelf games={INIT_GAMES} gameData={gameData} onSelect={setActive} theme={T}/>
                :<BookCoverGrid games={INIT_GAMES} gameData={gameData} onSelect={setActive}/>}
            </div>
          </div>
        </div>

        {/* CATEGORY LEGEND */}
        <div style={{background:"#1a1a2e",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"16px 24px"}}>
          <div style={{maxWidth:1200,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"#475569",fontWeight:700}}>Filter by Category</div>
              {catFilter&&<button onClick={()=>setCatFilter(null)} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#e2e8f0",fontSize:11,fontWeight:700,padding:"3px 12px",borderRadius:99,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>✕ Clear</button>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
              {LEGEND_CATS.map(({cat,color,emoji})=>{
                const count=INIT_GAMES.filter(g=>g.category===cat).length;
                const isActive=catFilter===cat;
                return(
                  <div key={cat} onClick={()=>setCatFilter(isActive?null:cat)}
                    style={{display:"flex",alignItems:"center",gap:7,background:isActive?color:"rgba(255,255,255,0.05)",border:`1.5px solid ${isActive?color:color+"55"}`,borderRadius:99,padding:"7px 14px",cursor:"pointer",transition:"all 0.18s",boxShadow:isActive?`0 0 16px ${color}66`:"none",transform:isActive?"scale(1.06)":"scale(1)"}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:isActive?"rgba(255,255,255,0.8)":color,flexShrink:0}}/>
                    <span style={{fontSize:13}}>{emoji}</span>
                    <span style={{fontSize:12,fontWeight:700,color:isActive?"#fff":"#e2e8f0"}}>{cat}</span>
                    <span style={{fontSize:11,fontWeight:700,color:isActive?"rgba(255,255,255,0.8)":"#475569",background:isActive?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.07)",padding:"1px 7px",borderRadius:99}}>{count}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#4ade80"}}/><span style={{fontSize:11,color:"#64748b",fontWeight:600}}>Owned</span></div>
              <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#f87171"}}/><span style={{fontSize:11,color:"#64748b",fontWeight:600}}>Wishlist</span></div>
              <span style={{fontSize:11,color:"#475569"}}>Faded = not yet owned · Hover spine to see title · Click to open</span>
            </div>
          </div>
        </div>

        {/* STICKY FILTER BAR */}
        <div style={{background:T.navBg,backdropFilter:"blur(16px)",boxShadow:`0 2px 20px rgba(0,0,0,0.08)`,padding:"12px 20px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between",position:"sticky",top:56,zIndex:100,borderBottom:`1px solid ${T.cardBorder}`}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {[["all",`All ${INIT_GAMES.length}`],["owned",`✓ Owned ${owned}`],["missing",`◯ Wishlist ${missing}`]].map(([k,l])=>(
              <button key={k} onClick={()=>setFilter(k)}
                style={{padding:"8px 18px",borderRadius:99,fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",border:"none",background:filter===k?T.accent:T.surface,color:filter===k?"#fff":T.textMuted,transition:"all 0.2s"}}>
                {l}
              </button>
            ))}
            {catFilter&&(()=>{
              const entry=LEGEND_CATS.find(l=>l.cat===catFilter);
              return(
                <div style={{display:"flex",alignItems:"center",gap:6,background:entry?.color+"18",border:`1.5px solid ${entry?.color}55`,borderRadius:99,padding:"6px 14px"}}>
                  <span style={{fontSize:14}}>{entry?.emoji}</span>
                  <span style={{fontWeight:700,fontSize:13,color:entry?.color}}>{catFilter}</span>
                  <button onClick={()=>setCatFilter(null)} style={{background:"none",border:"none",color:entry?.color,cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 0 0 2px",fontWeight:700}}>×</button>
                </div>
              );
            })()}
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search games…"
            style={{padding:"8px 18px",borderRadius:99,border:`2px solid ${T.inputBorder}`,fontFamily:"'Outfit',sans-serif",fontSize:13,outline:"none",width:220,color:T.text,background:T.inputBg,transition:"border-color 0.2s"}}
            onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.inputBorder}/>
        </div>

        {/* GAME GRID */}
        <div style={{maxWidth:1200,margin:"0 auto",padding:"26px 20px 60px"}}>
          {visible.length===0
            ?<div style={{textAlign:"center",padding:"80px 0",color:T.textMuted}}><div style={{fontSize:52}}>🎮</div><div style={{fontWeight:800,fontSize:18,marginTop:12,color:T.textMuted}}>No games found</div></div>
            :<>
              <div style={{fontSize:13,color:T.textMuted,marginBottom:16,fontWeight:600,animation:"fadeInUp 0.3s ease"}}>
                Showing {visible.length} game{visible.length!==1?"s":""}
                {catFilter&&<span style={{color:T.accent}}> in <strong>{catFilter}</strong></span>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:18}}>
                {visible.map(g=>(
                  <div key={g.id} style={{animation:"fadeInUp 0.3s ease"}}>
                    <GameCard game={g} gameData={gameData} onClick={()=>setActive(g)} theme={T}/>
                  </div>
                ))}
              </div>
            </>}
          {filter==="missing"&&missing>0&&(
            <div style={{marginTop:36,background:"linear-gradient(135deg,#0f0c29,#302b63)",borderRadius:22,padding:"26px 30px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:20,boxShadow:"0 12px 40px rgba(15,12,41,.35)"}}>
              <div>
                <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#a5b4fc",fontWeight:700,marginBottom:6}}>Complete Your Collection</div>
                <div style={{fontWeight:900,fontSize:36,color:"#fff"}}>${missingCost}<span style={{fontSize:16,fontWeight:400,color:"#64748b"}}>.00 est.</span></div>
              </div>
              <a href="https://www.wsgamecompany.com/collections/vintage-bookshelf-games" target="_blank" rel="noreferrer"
                style={{background:"linear-gradient(135deg,#6366f1,#818cf8)",color:"#fff",padding:"15px 26px",borderRadius:16,fontWeight:800,fontSize:14,textDecoration:"none",boxShadow:"0 6px 24px rgba(99,102,241,.45)"}}>
                Shop at WS Game Co →
              </a>
            </div>
          )}
        </div>
      </>)}

      {/* MODAL */}
      {active&&<Modal game={active} data={gameData[active.id]||{}} onClose={()=>setActive(null)} onUpdate={patch=>updateGame(active.id,patch)} theme={T}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
